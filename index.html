<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">

    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl font-bold mb-4">Login</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" name="email" placeholder="Email" class="input input-bordered w-full" required />
                
                <input type="password" id="password" name="password" placeholder="Password" class="input input-bordered w-full" required />
                
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            <p class="text-sm text-center mt-4">
                Don't have an account?
                <a href="views/register.html" class="link link-hover link-primary">Register</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth/login.js"></script>
</body>
</html>
